name: Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute tag
        id: tag
        run: |
          TAG=$(date -u '+%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -o dist/llm-go-friend-linux-amd64   ./cmd/llm-go-friend
          GOOS=linux  GOARCH=arm64 go build -o dist/llm-go-friend-linux-arm64   ./cmd/llm-go-friend
          GOOS=darwin GOARCH=amd64 go build -o dist/llm-go-friend-darwin-amd64  ./cmd/llm-go-friend
          GOOS=darwin GOARCH=arm64 go build -o dist/llm-go-friend-darwin-arm64  ./cmd/llm-go-friend

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*
